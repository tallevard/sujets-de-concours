<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Sujets de concours</title>

    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root{
            --bg: #f8f9fa;
            --card: #ffffff;
            --border: #e3e8ef;
            --muted: #5c6b7a;
            --text: #1f2933;
            --primary: #0b6bcb;
            --primary-soft: #e9f2ff;
            --chapter-bg: #f6f8fb;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
        }

        .filters {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 14px;
            margin: 10px auto 16px auto;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .filter-block label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .filter-block select {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #cfd6df;
            border-radius: 8px;
            background: #fff;
            font-size: 0.95rem;
        }

        .results-info {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .fiche {
            background: var(--card);
            border-radius: var(--radius);
            padding: 15px;
            margin: 12px auto;
            box-shadow: var(--shadow);
        }

        .fiche h2 {
            margin: 0 0 8px 0;
            font-size: 1.18rem;
            line-height: 1.25;
        }

        .descriptif-court {
            white-space: pre-line;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .meta-bloc {
            margin-top: 10px;
            padding: 10px 12px;
            background: var(--chapter-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .meta-titre {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #23415f;
        }

        .chapitre-item {
            margin-bottom: 10px;
        }

        .chapitre-item:last-child {
            margin-bottom: 0;
        }

        .chapitre-nom {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
            color: #1f3b5b;
        }

        .notions-liste {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .notion-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: #174a8b;
            font-size: 0.88rem;
            line-height: 1.3;
        }

        .actions {
            margin-top: 10px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.92rem;
        }

        button:hover {
            filter: brightness(0.96);
        }

        .detail {
            display: none;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 8px;
        }

        .detail ul {
            margin-top: 8px;
            padding-left: 20px;
        }

        .detail li {
            margin-bottom: 8px;
            line-height: 1.45;
            white-space: pre-line;
        }

        .infos-fiche {
            margin-top: 8px;
            line-height: 1.5;
        }

        .liens-fiche {
            margin-top: 10px;
        }

        .liens-fiche a {
            text-decoration: none;
        }

        .empty-state {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            color: var(--muted);
        }

        mjx-container, svg {
            max-width: 100%;
            overflow-x: auto;
        }

        @media (max-width: 700px) {
            body {
                padding: 8px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .fiche {
                padding: 12px;
            }

            .fiche h2 {
                font-size: 1.05rem;
            }

            .notion-tag {
                font-size: 0.82rem;
                padding: 4px 7px;
            }
        }
    </style>
</head>
<body>
<div class="page">

    <div class="filters">
        <div class="filters-grid">
            <div class="filter-block">
                <label for="concoursSelect">Concours</label>
                <select id="concoursSelect">
                    <option value="">-- Tous les concours --</option>
                </select>
            </div>

            <div class="filter-block">
                <label for="chapitreSelect">Chapitre</label>
                <select id="chapitreSelect">
                    <option value="">-- Choisir un chapitre --</option>
                </select>
            </div>

            <div class="filter-block">
                <label for="notionSelect">Notion</label>
                <select id="notionSelect" disabled>
                    <option value="">-- Choisir une notion --</option>
                </select>
            </div>
        </div>

        <div id="resultsInfo" class="results-info"></div>
    </div>

    <div id="container"></div>
</div>

<script>
function escapeHTML(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function cleanCell(value) {
    if (value == null) return '';
    let s = String(value);

    if (s.charCodeAt(0) === 0xFEFF) {
        s = s.slice(1);
    }

    s = s.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    if (s.startsWith('§') && s.endsWith('§') && s.length >= 2) {
        s = s.slice(1, -1);
    }

    return s.trim();
}

function toggleDetail(btn) {
    const fiche = btn.closest('.fiche');
    const detail = fiche.querySelector('.detail');
    const isOpen = detail.style.display === 'block';

    detail.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? 'Afficher les détails' : 'Masquer les détails';

    if (!isOpen) {
        MathJax.typesetPromise([detail]).catch(() => {});
    }
}

async function loadCSV(url) {
    const fetchUrl = `${url}?v=${Date.now()}`;
    const res = await fetch(fetchUrl, { cache: 'no-store' });
    if (!res.ok) {
        throw new Error(`Impossible de charger ${url} (${res.status})`);
    }

    const text = await res.text();

    const rows = [];
    let row = [];
    let cell = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
            if (inQuotes && nextChar === '"') {
                cell += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
            continue;
        }

        if (char === ',' && !inQuotes) {
            row.push(cell);
            cell = '';
            continue;
        }

        if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && nextChar === '\n') {
                i++;
            }
            row.push(cell);
            cell = '';

            if (row.some(x => x !== '')) {
                rows.push(row);
            }
            row = [];
            continue;
        }

        cell += char;
    }

    row.push(cell);
    if (row.some(x => x !== '')) {
        rows.push(row);
    }

    if (rows.length === 0) {
        return [];
    }

    const headers = rows.shift().map(h => cleanCell(h));

    return rows.map(entries => {
        const obj = {};
        headers.forEach((h, i) => {
            obj[h] = cleanCell(entries[i] ?? '');
        });
        return obj;
    });
}

function parseChapitres(chapitresRaw) {
    if (!chapitresRaw || !chapitresRaw.trim()) {
        return [];
    }

    return chapitresRaw
        .split(';')
        .map(entry => entry.trim())
        .filter(Boolean)
        .map(entry => {
            const idx = entry.indexOf(':');

            if (idx === -1) {
                return {
                    chapitre: entry.trim(),
                    notions: []
                };
            }

            const chapitre = entry.slice(0, idx).trim();
            const notionsRaw = entry.slice(idx + 1).trim();

            const notions = notionsRaw
                ? notionsRaw.split(',').map(n => n.trim()).filter(Boolean)
                : [];

            return { chapitre, notions };
        })
        .filter(item => item.chapitre);
}

function extractConcoursList(fiches) {
    return [...new Set(
        fiches.map(f => (f.concours || '').trim()).filter(Boolean)
    )].sort((a, b) => a.localeCompare(b, 'fr'));
}

function populateConcoursSelect(concoursList) {
    const select = document.getElementById('concoursSelect');
    select.innerHTML = '<option value="">-- Tous les concours --</option>';

    concoursList.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        select.appendChild(opt);
    });
}

function extractChapitresMap(fiches) {
    const map = {};

    fiches.forEach(fiche => {
        parseChapitres(fiche.Chapitres).forEach(({ chapitre, notions }) => {
            if (!map[chapitre]) {
                map[chapitre] = new Set();
            }
            notions.forEach(n => map[chapitre].add(n));
        });
    });

    const out = {};
    Object.keys(map)
        .sort((a, b) => a.localeCompare(b, 'fr'))
        .forEach(k => {
            out[k] = Array.from(map[k]).sort((a, b) => a.localeCompare(b, 'fr'));
        });

    return out;
}

function populateChapitreSelect(chapitresMap) {
    const select = document.getElementById('chapitreSelect');
    select.innerHTML = '<option value="">-- Choisir un chapitre --</option>';

    Object.keys(chapitresMap).forEach(chap => {
        const opt = document.createElement('option');
        opt.value = chap;
        opt.textContent = chap;
        select.appendChild(opt);
    });
}

function populateNotionSelect(notions) {
    const select = document.getElementById('notionSelect');
    select.innerHTML = '<option value="">-- Choisir une notion --</option>';

    notions.forEach(notion => {
        const opt = document.createElement('option');
        opt.value = notion;
        opt.textContent = notion;
        select.appendChild(opt);
    });

    select.disabled = false;
}

function resetNotionSelect() {
    const select = document.getElementById('notionSelect');
    select.innerHTML = '<option value="">-- Choisir une notion --</option>';
    select.disabled = true;
}

function buildChapitresHTML(chapitresRaw) {
    const blocs = parseChapitres(chapitresRaw);

    if (blocs.length === 0) {
        return '';
    }

    const html = blocs.map(({ chapitre, notions }) => {
        const tags = notions.length
            ? `<div class="notions-liste">${
                notions.map(n => `<span class="notion-tag">${escapeHTML(n)}</span>`).join('')
              }</div>`
            : '<div class="notions-liste"></div>';

        return `
            <div class="chapitre-item">
                <span class="chapitre-nom">${escapeHTML(chapitre)}</span>
                ${tags}
            </div>
        `;
    }).join('');

    return `
        <div class="meta-bloc">
            <div class="meta-titre">Chapitres abordés</div>
            ${html}
        </div>
    `;
}

function buildDetailHTML(raw) {
    if (!raw || !raw.trim()) {
        return '<i>Aucun descriptif détaillé fourni.</i>';
    }

    if (raw.includes('\\item')) {
        const items = raw
            .split('\\item')
            .map(item => item.trim())
            .filter(Boolean);

        if (items.length > 0) {
            return '<ul>' + items.map(item => `<li>${escapeHTML(item)}</li>`).join('') + '</ul>';
        }
    }

    return `<div style="white-space: pre-line;">${escapeHTML(raw)}</div>`;
}

function buildLinksHTML(fiche) {
    const links = [];

    if ((fiche.lien_sujet || '').trim()) {
        links.push(
            `<a href="${escapeHTML(fiche.lien_sujet)}" target="_blank" rel="noopener noreferrer">📄 Sujet</a>`
        );
    }

    if ((fiche.lien_corrige || '').trim()) {
        links.push(
            `<a href="${escapeHTML(fiche.lien_corrige)}" target="_blank" rel="noopener noreferrer">✅ Corrigé</a>`
        );
    }

    return links.join(' | ');
}


function generateHTML(data) {
    const cont = document.getElementById('container');
    const resultsInfo = document.getElementById('resultsInfo');

    cont.innerHTML = '';
    resultsInfo.textContent = `${data.length} sujet${data.length > 1 ? 's' : ''}`;

    if (data.length === 0) {
        cont.innerHTML = '<div class="empty-state">Aucun sujet ne correspond aux filtres sélectionnés.</div>';
        return;
    }

    data.forEach(fiche => {
        const el = document.createElement('div');
        el.className = 'fiche';

        const titre = `${fiche.epreuve || ''}${fiche.exercice ? ' - ' + fiche.exercice : ''}`;

        const detailHTML = buildDetailHTML(fiche.descriptif_detaille || '');
        const chapitresHTML = buildChapitresHTML(fiche.Chapitres || '');
        const liensHTML = buildLinksHTML(fiche);

        el.innerHTML = `
            <h2>${escapeHTML(titre)}</h2>

            <div class="descriptif-court">
                ${escapeHTML(fiche.descriptif_court || '')}
            </div>

            <div class="actions">
                <button onclick="toggleChapitres(this)">Afficher les chapitres</button>
                <button onclick="toggleDetail(this)">Afficher les détails</button>
            </div>

            <div class="chapitres-detail">
                ${chapitresHTML}
            </div>

            <div class="detail">
                ${detailHTML}
            </div>

            <div class="infos-fiche"><strong>Intérêt :</strong> ${escapeHTML(fiche.interet || '')}</div>
            <div class="infos-fiche"><strong>Difficulté :</strong> ${escapeHTML(fiche.difficulte || '')}</div>
            <div class="infos-fiche"><strong>Rencontré lors de… :</strong> ${escapeHTML(fiche.rencontre || '')}</div>

            <div class="liens-fiche">
                ${liensHTML}
            </div>
        `;

        cont.appendChild(el);
    });

    MathJax.typesetPromise([cont]).catch(() => {});
}

async function loadCSVAndBuildFilters(url) {
    const fiches = await loadCSV(url);

    const concoursSelect = document.getElementById('concoursSelect');
    const chapitreSelect = document.getElementById('chapitreSelect');
    const notionSelect = document.getElementById('notionSelect');

    populateConcoursSelect(extractConcoursList(fiches));

    function getFichesConcours() {
        const concours = concoursSelect.value;
        if (!concours) return fiches;
        return fiches.filter(f => (f.concours || '') === concours);
    }

    function updateChapitreOptions() {
        const chapitreMap = extractChapitresMap(getFichesConcours());
        populateChapitreSelect(chapitreMap);
        resetNotionSelect();
        return chapitreMap;
    }

    function applyAllFilters() {
        const concours = concoursSelect.value;
        const chapitre = chapitreSelect.value;
        const notion = notionSelect.value;

        let filtered = [...fiches];

        if (concours) {
            filtered = filtered.filter(f => (f.concours || '') === concours);
        }

        if (chapitre) {
            filtered = filtered.filter(fiche =>
                parseChapitres(fiche.Chapitres).some(item => item.chapitre === chapitre)
            );
        }

        if (chapitre && notion) {
            filtered = filtered.filter(fiche =>
                parseChapitres(fiche.Chapitres).some(item =>
                    item.chapitre === chapitre && item.notions.includes(notion)
                )
            );
        }

        generateHTML(filtered);
    }

    concoursSelect.addEventListener('change', () => {
        chapitreSelect.value = '';
        notionSelect.value = '';
        updateChapitreOptions();
        applyAllFilters();
    });

    chapitreSelect.addEventListener('change', () => {
        const chapitre = chapitreSelect.value;
        const chapitreMap = extractChapitresMap(getFichesConcours());

        notionSelect.value = '';

        if (!chapitre) {
            resetNotionSelect();
            applyAllFilters();
            return;
        }

        populateNotionSelect(chapitreMap[chapitre] || []);
        applyAllFilters();
    });

    notionSelect.addEventListener('change', () => {
        applyAllFilters();
    });

    updateChapitreOptions();
    applyAllFilters();
}

window.addEventListener('DOMContentLoaded', async () => {
    try {
        await loadCSVAndBuildFilters('fiches.csv');
    } catch (err) {
        const cont = document.getElementById('container');
        cont.innerHTML = `<div class="empty-state">Erreur au chargement du site : ${escapeHTML(err.message)}</div>`;
        console.error(err);
    }
});
</script>
</body>
</html>
